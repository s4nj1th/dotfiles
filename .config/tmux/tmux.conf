
set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:RGB"
set -g extended-keys on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g mouse on
set -g remain-on-exit off
setw -g mode-keys vi

unbind '"'
unbind %

bind | split-window -h
bind - split-window -v

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r ^ last-window

bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux reloaded"

set -g status-position bottom
set -g status-justify absolute-centre
set -g status-style 'fg=color7 bg=default'

set -g status-left '#{session_path} '
set -g status-left-length 50
set -g status-left-style 'fg=color8'

set -g status-right '#(~/.local/bin/tmux-git-branch.sh "#{pane_current_path}")'
set -g status-right-style 'fg=color8'
set -g status-right-length 100

setw -g window-status-style 'fg=color8'
setw -g window-status-current-style 'fg=colour2 bg=default bold'
setw -g window-status-current-format ' #I:#W '
